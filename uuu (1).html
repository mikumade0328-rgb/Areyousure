<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>山水生靈留言板 - 互動動態牆</title>
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

:root {
/* 定義 Pantone 主色調 /
--p325-cyan: #55C6D9; / PANTONE 325 C - 水青色 /
--p360-green: #00AF3F; / PANTONE 360 C - 葉綠色 */

/* 衍生色與輔助色 /
--bg-mist: #F0F8F7; / 極淡的青色 mist /
--card-rock: #ECECE7; / 淺灰色岩石感 /
--text-dark: #2C3E50; / 深藍灰 /
--parchment: #FCFAF2; / 淺米色羊皮紙感 */

/* 漸變色設定 */
--primary-gradient: linear-gradient(135deg, var(--p325-cyan) 0%, #A8E6CF 50%, var(--p360-green) 100%);
--button-gradient: linear-gradient(135deg, var(--p360-green) 0%, var(--p325-cyan) 100%);

/* 陰影與特效 /
--shadow-sm: 0 4px 6px rgba(0, 0, 0, 0.07);
--shadow-lg: 0 15px 30px rgba(0, 175, 63, 0.15); / 使用綠色陰影 */
--shadow-xl: 0 20px 40px rgba(0, 0, 0, 0.2);
}

body {
font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
overflow: hidden;
background: var(--bg-mist);
color: var(--text-dark);
}

/* ===== 通用頁面樣式 ===== /
.page {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
display: none;
opacity: 0;
transition: opacity 0.6s ease-in-out, transform 0.6s ease-in-out;
transform: scale(1.05); / 轉場時輕微縮放 */
}

.page.active {
display: flex;
opacity: 1;
z-index: 10;
transform: scale(1);
}

/* ===== COVER 頁面 (山水初現) ===== */
#cover {
background: var(--primary-gradient);
align-items: center;
justify-content: space-between;
padding: 60px 80px;
position: relative;
overflow: hidden;
}

/* 增加 CSS 繪製的遠山與流水背景裝飾 /
#cover::before {
content: '';
position: absolute;
bottom: -50px;
left: 0;
width: 100%;
height: 300px;
background: rgba(255, 255, 255, 0.1);
border-radius: 50% 50% 0 0; / 模擬連綿山丘 */
z-index: 1;
}

#cover::after {
content: '';
position: absolute;
bottom: 0;
left: 0;
width: 100%;
height: 100px;
background: repeating-linear-gradient(0deg, rgba(85,198,217,0.1), rgba(85,198,217,0.1) 10px, transparent 10px, transparent 20px);
z-index: 1; /* 模擬流水波紋 */
}

@keyframes slideInUp {
from { opacity: 0; transform: translateY(30px); }
to { opacity: 1; transform: translateY(0); }
}

.cover-content {
flex: 1;
z-index: 2;
color: white;
text-shadow: 0 2px 4px rgba(0,0,0,0.2); /* 增加文字陰影提高可讀性 */
}

.cover-title {
font-size: 64px;
font-weight: 700;
margin-bottom: 20px;
letter-spacing: 2px;
animation: slideInUp 0.8s ease-out;
}

.cover-subtitle {
font-size: 20px;
opacity: 0.95;
margin-bottom: 40px;
line-height: 1.8;
animation: slideInUp 0.8s ease-out 0.1s backwards;
}

.btn-start {
display: inline-block;
padding: 18px 50px;
background: white; /* 起始按鈕用白色突出 /
border: 2px solid white;
color: var(--p360-green); / 文字用綠色 */
font-size: 18px;
font-weight: 600;
border-radius: 50px;
cursor: pointer;
transition: all 0.3s ease;
animation: slideInUp 0.8s ease-out 0.2s backwards;
box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

.btn-start:hover {
background: var(--p325-cyan);
color: white;
border-color: var(--p325-cyan);
transform: translateY(-3px) scale(1.05);
box-shadow: var(--shadow-lg);
}
    /* 預覽區塊換成山水生物 */
.cover-preview {
flex: 1;
display: grid;
grid-template-columns: 1fr 1fr;
gap: 30px;
padding-left: 60px;
z-index: 2;
}

.preview-item {
aspect-ratio: 1;
background: rgba(255, 255, 255, 0.2); /* 半透明水質感 /
border-radius: 50% 20% 50% 20%; / 模擬有機形狀/葉片 */
display: flex;
align-items: center;
justify-content: center;
font-size: 90px;
backdrop-filter: blur(5px);
border: 2px solid rgba(255, 255, 255, 0.3);
animation: float 6s ease-in-out infinite;
}

@keyframes float {
0%, 100% { transform: translateY(0px) rotate(0deg); }
50% { transform: translateY(-20px) rotate(5deg); }
}

.preview-item:nth-child(2) { animation-delay: 1s; border-radius: 20% 50% 20% 50%; }
.preview-item:nth-child(3) { animation-delay: 2s; border-radius: 20% 50% 20% 50%; }
.preview-item:nth-child(4) { animation-delay: 3s; }

/* ===== STEP1 選擇圖案 (靈動萬物) ===== */
#step1 {
flex-direction: column;
align-items: center;
justify-content: center;
background: linear-gradient(to bottom, var(--bg-mist) 0%, #E0F2F1 100%);
padding: 60px 40px;
}

.step-title {
font-size: 36px;
color: var(--text-dark);
margin-bottom: 60px;
font-weight: 600;
animation: slideInDown 0.6s ease-out;
letter-spacing: 1px;
}

.emoji-grid {
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 30px;
max-width: 800px;
animation: slideInUp 0.6s ease-out;
}

.emoji-card {
aspect-ratio: 1;
background: white;
border-radius: 30px; /* 更圓潤的岩石感 */
display: flex;
align-items: center;
justify-content: center;
font-size: 90px;
cursor: pointer;
box-shadow: var(--shadow-sm);
transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
transform-origin: center;
border: 4px solid transparent;
}

.emoji-card:hover {
transform: translateY(-15px) scale(1.05);
box-shadow: 0 20px 40px rgba(85,198,217,0.2); /* Cyan shadow on hover */
border-color: var(--p325-cyan);
}

.emoji-card:active {
transform: scale(0.95);
}

/* ===== STEP2 輸入留言 (紙墨傳情) ===== /
#step2 {
flex-direction: column;
align-items: center;
justify-content: center;
background: linear-gradient(135deg, #FFFDEB 0%, #F3F9E1 100%); / 淡雅紙色漸變 */
padding: 60px 40px;
}

.input-container {
background: var(--parchment); /* 淺米色羊皮紙 /
border-radius: 24px;
padding: 50px;
box-shadow: var(--shadow-xl);
max-width: 600px;
width: 100%;
animation: slideInUp 0.6s ease-out;
border: 1px solid #E6E0C8; / 仿舊紙邊緣 */
position: relative;
}

/* 裝飾藤蔓 CSS 繪製 */
.input-container::before {
content: '🍃';
position: absolute;
top: -20px;
right: -20px;
font-size: 40px;
transform: rotate(15deg);
}

.selected-emoji {
text-align: center;
font-size: 70px;
margin-bottom: 30px;
filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
}

.step2-title {
font-size: 26px;
color: var(--text-dark);
margin-bottom: 25px;
text-align: center;
font-weight: 600;
letter-spacing: 1px;
}

.textarea-wrapper {
position: relative;
margin-bottom: 25px;
}

textarea {
width: 100%;
height: 140px;
padding: 20px;
border: 2px solid #D8D2B9;
border-radius: 16px;
font-size: 17px;
font-family: inherit;
resize: none;
transition: all 0.3s ease;
background: rgba(255,255,255,0.7);
color: #3E2723; /* 深棕色文字 */
line-height: 1.6;
}

textarea:focus {
outline: none;
border-color: var(--p360-green);
background: white;
box-shadow: 0 0 0 4px rgba(0, 175, 63, 0.1);
}

.char-count {
text-align: right;
color: #8D6E63;
font-size: 15px;
margin-top: 10px;
}

.char-count.warning { color: #D84315; font-weight: bold;}

.btn-submit {
width: 100%;
padding: 16px;
background: var(--button-gradient);
color: white;
border: none;
border-radius: 50px;
font-size: 18px;
font-weight: 600;
cursor: pointer;
transition: all 0.3s ease;
margin-top: 10px;
letter-spacing: 2px;
box-shadow: 0 5px 15px rgba(0, 175, 63, 0.2);
}

.btn-submit:hover:not(:disabled) {
transform: translateY(-3px);
box-shadow: 0 10px 25px rgba(85,198,217,0.3);
}

.btn-submit:disabled {
opacity: 0.6;
cursor: not-allowed;
background: #9E9E9E;
}

/* ===== STEP3 動態留言牆 (山水生靈牆) ===== /
#step3 {
flex-direction: column;
align-items: center;
justify-content: center;
/ 背景換成充滿自然感的淡雅山水漸變 */
background: linear-gradient(to bottom, #E0F7FA 0%, #E8F5E9 100%);
padding: 40px;
}

.gallery-container {
width: 95%;
max-width: 1200px;
height: 80vh;
background: rgba(255, 255, 255, 0.6); /* 半透明霧面質感 */
border-radius: 40px;
box-shadow: var(--shadow-xl);
position: relative;
overflow: hidden;
backdrop-filter: blur(15px);
border: 2px solid rgba(255, 255, 255, 0.5);
}

/* 增加邊框裝飾，模擬竹框或藤編感 */
.gallery-container::after {
content: '';
position: absolute;
top: 10px; left: 10px; right: 10px; bottom: 10px;
border: 2px dashed rgba(0, 175, 63, 0.2);
border-radius: 32px;
pointer-events: none;
}

.canvas-area {
width: 100%;
height: 100%;
position: relative;
overflow: hidden;
/* 增加一個非常淡的山水墨跡背景圖案 (CSS 繪製) */
background-image:
radial-gradient(circle at 20% 30%, rgba(85,198,217,0.05) 0%, transparent 20%),
radial-gradient(circle at 80% 70%, rgba(0,175,63,0.05) 0%, transparent 25%);
}

/* ===== 🔥 圖塊換成岩石/卵石生物感 🔥 ===== /
.message-card {
position: absolute;
background: var(--card-rock); / 岩石灰色 /
/ 橢圓形狀模擬鵝卵石 /
border-radius: 60px 40px 70px 50px / 50px 70px 40px 60px;
padding: 20px 25px;
box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
user-select: none;
word-wrap: break-word;
font-size: 15px;
line-height: 1.5;
will-change: transform;
transition: box-shadow 0.3s ease, border-color 0.3s ease;
border: 3px solid #D7D7D0; / 岩石邊緣 */

/* 將卡片尺寸鎖定放大，確保與碰撞箱完全一致 */
width: 240px;
height: 170px;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
text-align: center;
}

.message-card:hover {
box-shadow: 0 15px 35px rgba(0, 175, 63, 0.25); /* 綠色懸浮陰影 */
border-color: var(--p360-green);
}

.message-emoji {
font-size: 28px; /* 圖形稍大 */
margin-bottom: 12px;
display: block;
line-height: 1;
filter: drop-shadow(0 3px 5px rgba(0,0,0,0.1));
}

.message-text {
color: #333333; /* 深灰色文字，保持高可讀性 /
font-weight: 500;
overflow: hidden;
display: -webkit-box;
-webkit-line-clamp: 3; / 最多顯示三行文字 */
-webkit-box-orient: vertical;
}

.next-btn {
position: absolute;
bottom: 40px;
right: 40px;
padding: 15px 30px;
background: var(--button-gradient);
color: white;
border: none;
border-radius: 50px;
cursor: pointer;
font-weight: 600;
font-size: 16px;
transition: all 0.3s ease;
z-index: 100;
letter-spacing: 1px;
box-shadow: 0 5px 15px rgba(0, 175, 63, 0.3);
}

.next-btn:hover {
transform: translateY(-3px) scale(1.03);
box-shadow: 0 10px 25px rgba(85,198,217,0.4);
}

/* ===== 響應式設計 ===== */
@media (max-width: 768px) {
#cover { flex-direction: column; padding: 40px 20px; text-align: center; }
.cover-content { margin-bottom: 40px; display: flex; flex-direction: column; align-items: center; }
.cover-title { font-size: 40px; }
.cover-subtitle { font-size: 16px; margin-bottom: 30px; }
.btn-start { padding: 15px 35px; font-size: 16px; }
.cover-preview { grid-template-columns: 1fr 1fr; padding-left: 0; gap: 20px; width: 100%; max-width: 400px; }
.preview-item { font-size: 60px; }

.step-title { font-size: 28px; margin-bottom: 40px; }
.emoji-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; }
.emoji-card { font-size: 70px; border-radius: 20px; }

.input-container { padding: 30px 20px; }
.step2-title { font-size: 20px; }
textarea { height: 110px; font-size: 16px; }

.gallery-container { height: 75vh; border-radius: 30px; }
.message-card { width: 190px; height: 130px; padding: 15px; border-radius: 40px 30px 50px 35px / 35px 50px 30px 45px; }
.message-emoji { font-size: 22px; margin-bottom: 8px; }
.message-text { font-size: 13px; -webkit-line-clamp: 2; }
.next-btn { bottom: 25px; right: 25px; padding: 12px 20px; font-size: 14px; }
}
</style>
</head>
<body>
<div id="cover" class="page active">
<div class="cover-content">
<div class="cover-title">生靈留言板</div>
<div class="cover-subtitle">
採擷天地靈氣，分享萬物心聲<br>
讓每一抹思緒，皆化為山水間的奇妙遇見
</div>
<button class="btn-start" onclick="app.goToStep(1)">開啟靈性之旅</button>
</div>
<div class="cover-preview">
<div class="preview-item">⛰️</div>
<div class="preview-item">🌊</div>
<div class="preview-item">🌲</div>
<div class="preview-item">🐦</div>
</div>
</div>

<div id="step1" class="page">
<div class="step-title">請喚醒萬物靈光</div>
<div class="emoji-grid">
<div class="emoji-card" data-emoji="🎁" onclick="app.selectEmoji('🎁')">🎁</div>
<div class="emoji-card" data-emoji="🍕" onclick="app.selectEmoji('🍕')">🍕</div>
<div class="emoji-card" data-emoji="🧋" onclick="app.selectEmoji('🧋')">🧋</div>
<div class="emoji-card" data-emoji="📝" onclick="app.selectEmoji('📝')">📝</div>
</div>
</div>

<div id="step2" class="page">
<div class="input-container">

id="messageInput"

</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

// 原本的金鑰與設定完全不變
const firebaseConfig = {
apiKey: "AIzaSyAk7_r7HGijcFBzTjameuieXoSCrBwrg0g",
authDomain: "uuu566-ec42d.firebaseapp.com",

messagingSenderId: "148385432205",
appId: "1:148385432205:web:5055eaaab6206e8c6b98c4",
measurementId: "G-215P1M3NYL"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp);

// ===== 物理引擎 (與新卡片尺寸匹配) =====
class PhysicsCard {
constructor(emoji, message, x, y, containerWidth, containerHeight) {
this.emoji = emoji;
this.message = message;
this.x = x;
this.y = y;
// 模擬生物游動/飛行的輕微隨機初速
this.vx = (Math.random() - 0.5) * 6;
this.vy = Math.random(); // 初始大多向下墜落
this.rotation = Math.random() * 20 - 10; // 初始旋轉
this.rotationVelocity = (Math.random() - 0.5) * 0.12;

// 物理碰撞箱尺寸 (需與 CSS .message-card 匹配)
const isMobile = window.innerWidth <= 768;
this.width = isMobile ? 190 : 240; // 稍寬一點的岩石形
this.height = isMobile ? 130 : 170; // 稍矮一點

this.gravity = 0.35; // 稍輕的重力，有飄浮感
this.friction = 0.99; // 極低摩擦力，模擬水中游動或滑動
this.bounceElasticity = 0.65; // 中等回彈，模擬生物肉體或柔軟岩石的碰撞

this.isResting = false;
this.restFrames = 0;
this.containerWidth = containerWidth;
this.containerHeight = containerHeight;
this.element = null;
}

update(cards, containerHeight) {
if (this.isResting) {
this.restFrames++;
// 即使靜止，也保持極細微的顫動 (模擬生物呼吸)
if (this.restFrames < 60) {
this.x += (Math.random() - 0.5) * 0.1;
this.y += (Math.random() - 0.5) * 0.1;
this.rotation += (Math.random() - 0.5) * 0.02;
}
return;
}

// 物理核心計算
this.vy += this.gra
// 物理核心計算
this.vy += this.gravity;
this.x += this.vx;
this.y += this.vy;
this.vx *= this.friction;
this.vy *= this.friction;

this.rotation += this.rotationVelocity;
this.rotationVelocity *= 0.98; // 旋轉阻尼

// 邊界碰撞（左右）
if (this.x < 0) {
this.x = 0;
this.vx = Math.abs(this.vx) * this.bounceElasticity;
this.rotationVelocity *= -0.5; // 碰撞導致旋轉方向改變
}
if (this.x + this.width > this.containerWidth) {
this.x = this.containerWidth - this.width;
this.vx = -Math.abs(this.vx) * this.bounceElasticity;
this.rotationVelocity *= -0.5;
}

// 卡片互相碰撞 (物理基礎不變)
for (let card of cards) {
if (card === this) continue;
if (this.checkCollisionAABB(card)) {
// 碰撞喚醒靜止卡片
if (card.isResting && (Math.abs(this.vx) > 0.8 || Math.abs(this.vy) > 0.8)) {
card.isResting = false;
card.restFrames = 0;
}
this.resolveCollision(card);
}
}

// 地面碰撞 (模擬落在水底或岩石地面)
if (this.y + this.height >= containerHeight) {
this.y = containerHeight - this.height;
this.vy *= -this.bounceElasticity;

// 放寬靜止條件，讓其彈跳更完整
if (Math.abs(this.vy) < 1.8 && Math.abs(this.vx) < 1.0) {
this.isResting = true;
this.vy = 0;
this.restFrames = 0;
}
}

// 整體完全靜止檢查
if (Math.abs(this.vx) < 0.2 && Math.abs(this.vy) < 0.2 && Math.abs(this.rotationVelocity) < 0.05 && (this.y + this.height >= containerHeight - 5)) {
this.isResting = true;
this.vx = 0;
this.vy = 0;
this.rotationVelocity = 0;
this.restFrames = 0;
}
}

checkCollisionAABB(other) {
return !(this.x + this.width < other.x ||
this.x > other.x + other.width ||
this.y + this.height < other.y ||
this.y > other.y + other.height);
}

resolveCollision(other) {
const overlapLeft = (this.x + this.width) - other.x;
const overlapRight = (other.x + other.width) - this.x;
const overlapTop = (this.y + this.height) - other.y;
const overlapBottom = (other.y + other.height) - this.y;

const minOverlapX = Math.min(overlapLeft, overlapRight);
const minOverlapY = Math.min(overlapTop, overlapBottom);

if (minOverlapX < minOverlapY) {
if (overlapLeft < overlapRight) {
this.x = other.x - this.width;
this.vx = -Math.abs(this.vx) * this.bounceElasticity;
other.vx = Math.abs(other.vx) * this.bounceElasticity;
} else {
this.x = other.x + other.width;
this.vx = Math.abs(this.vx) * this.bounceElasticity;
other.vx = -Math.abs(other.vx) * this.bounceElasticity;
}
} else {
if (overlapTop < overlapBottom) {
this.y = other.y - this.height;
this.vy = -Math.abs(this.vy) * this.bounceElasticity;
other.vy = Math.abs(other.vy) * this.bounceElasticity;
} else {
this.y = other.y + other.height;
this.vy = Math.abs(this.vy) * this.bounceElasticity;
other.vy = -Math.abs(other.vy) * this.bounceElasticity;
}
}
// 轉動效果
this.rotationVelocity += (this.vx - other.vx) * 0.02;
}
}

const app = {

goToStep(step) {
// 簡單淡出舊頁面
const activePage = document.querySelector('.page.active');
if(activePage) activePage.style.opacity = '0';

setTimeout(() => {
document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
if (step === 1) {
document.getElementById('step1').classList.add('active');
} else if (step === 2) {
document.getElementById('step2').classList.add('active');
} else if (step === 3) {
document.getElementById('step3').classList.add('active');
this.fetchAndStartGallery();
} else {
document.getElementById('cover').classList.add('active');
}
}, 300); // 縮短等待時間，配合 scale 轉場
},

selectEmoji(emoji) {
this.currentEmoji = emoji;
document.getElementById('selectedEmojiDisplay').textContent = emoji;
this.goToStep(2);
document.getElementById('messageInput').focus();
},

updateCharCount() {
const input = document.getElementById('messageInput');
const count = document.getElementById('charCount');
const charCountDiv = document.querySelector('.char-count');
count.textContent = input.value.length;
charCountDiv.classList.toggle('warning', input.value.length > 40);
},

async submitMessage() {
if (this.isSubmitting) return;

const text = document.getElementById('messageInput').value.trim();
if (!text || !this.currentEmoji) return;

const submitBtn = document.querySelector('.btn-submit');
submitBtn.textContent = '傳送心聲中...';
this.isSubmitting = true;

try {
await addDoc(collection(db, "messages"), {
emoji: this.currentEmoji,
message: text,
timestamp: Date.now()
});

document.getElementById('messageInput').value = '';
this.updateCharCount();
submitBtn.textContent = '送出心聲';
this.isSubmitting = false;
this.goToStep(3);

} catch (error) {
console.error('寫入 Firebase 失敗:', error);
submitBtn.textContent = '送出心聲';
this.isSubmitting = false;
alert('與萬物連線失敗，請檢查網路。');
}
},

async fetchAndStartGallery() {
const canvasArea = document.getElementById('canvasArea');
canvasArea.innerHTML = '<div style="color:var(--text-dark); text-align:center; padding-top: 50px; font-weight: bold; font-size: 24px;">天地靈氣匯聚中...</div>';
this.cards = [];

try {
// 原本大綱：限制 20 筆
const q = query(collection(db, "messages"), orderBy("timestamp", "desc"), limit(20));
const querySnapshot = await getDocs(q);

const messages = [];
querySnapshot.forEach((doc) => {
messages.push(doc.data());
});

messages.reverse(); // 最新的在最後生成，掉在最上面

canvasArea.innerHTML = '';
this.containerHeight = canvasArea.offsetHeight;
const containerWidth = canvasArea.offsetWidth;

messages.forEach((data, index) => {
// 模擬生物接連喚醒的時間差
const delay = index * 0.2 + Math.random() * 0.1;
setTimeout(() => {
// 生成物理卡片
const card = new PhysicsCard(
data.emoji,
data.message,
Math.random() * (containerWidth - 240),
-250 - Math.random() * 300, // 初始位置更高，掉落感更強
containerWidth,
this.containerHeight
);

// 生成 DOM 元素
const element = document.createElement('div');
element.className = 'message-card';
// 增加一個隨機的岩石紋理特效 (CSS)
element.style.background = var(--card-rock) radial-gradient(circle at ${Math.random()*100}% ${Math.random()*100}%, rgba(0,0,0,0.03) 0%, transparent 10%);
element.style.borderTopRightRadius = ${40 + Math.random()*20}px ${60 + Math.random()*20}px;
element.style.borderBottomLeftRadius = ${60 + Math.random()*20}px ${40 + Math.random()*20}px;

element.innerHTML = &lt;span class="message-emoji"&gt;${card.emoji}</span>
<div class="message-text">${card.message}&lt;/div&gt;;
canvasArea.appendChild(element);
card.element = element;

this.cards.push(card);
}, delay * 1000);
});
} catch (error) {
console.error('從 Firebase 讀取失敗:', error);
canvasArea.innerHTML = '<div style="color:var(--text-dark); text-align:center; padding-top: 50px; font-size: 20px;">載入失敗，天地失序。</div>';
}
},

startPhysicsLoop() {
const canvasArea = document.getElementById('canvasArea');

const animate = () => {
if (document.getElementById('step3').classList.contains('active') && canvasArea) {
const containerHeight = canvasArea.offsetHeight;

this.cards.forEach(card => {
card.update(this.cards, containerHeight);
if (card.element) {
// 將物理數據應用於 CSS transform
card.element.style.left = card.x + 'px';
card.element.style.top = card.y + 'px';
card.element.style.transform = rotate(${card.rotation}deg);
// 靜止時不透明度 1，運動時輕微透明度
card.element.style.opacity = card.isResting ? 1 : 0.96;
}
});
}
this.animationId = requestAnimationFrame(animate);
};
animate();
}
};

// 模組化變數綁定到全域 window 上
window.app = app;

document.addEventListener('DOMContentLoaded', () => {
app.init();
});
</script>
</body>
</html>
