<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美崙溪記憶之牆 - 互動留言板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --p325-cyan: #55C6D9; 
            --p360-green: #00AF3F; 
            --bg-mist: #F0F8F7; 
            --card-rock: #ECECE7; 
            --text-dark: #2C3E50; 
            --parchment: #FCFAF2; 
            
            --primary-gradient: linear-gradient(135deg, var(--p325-cyan) 0%, #A8E6CF 50%, var(--p360-green) 100%);
            --button-gradient: linear-gradient(135deg, var(--p360-green) 0%, var(--p325-cyan) 100%);
            
            --shadow-sm: 0 4px 6px rgba(0, 0, 0, 0.07);
            --shadow-lg: 0 15px 30px rgba(0, 175, 63, 0.15); 
            --shadow-xl: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        body {
            font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
            overflow: hidden;
            background: var(--bg-mist);
            color: var(--text-dark);
        }

        .page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            opacity: 0;
            transition: opacity 0.6s ease-in-out, transform 0.6s ease-in-out;
            transform: scale(1.05); 
        }

        .page.active {
            display: flex;
            opacity: 1;
            z-index: 10;
            transform: scale(1);
        }

        /* ===== COVER 頁面 ===== */
        #cover {
            background: var(--primary-gradient);
            align-items: center;
            justify-content: space-between;
            padding: 60px 80px;
            position: relative;
            overflow: hidden;
        }

        #cover::before {
            content: '';
            position: absolute;
            bottom: -50px;
            left: 0;
            width: 100%;
            height: 300px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50% 50% 0 0; 
            z-index: 1;
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .cover-content {
            flex: 1;
            z-index: 2;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2); 
        }

        .cover-title {
            font-size: 64px;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: 2px;
            animation: slideInUp 0.8s ease-out;
        }

        .btn-start {
            display: inline-block;
            padding: 18px 50px;
            background: white; 
            border: 2px solid white;
            color: var(--p360-green); 
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn-start:hover {
            background: var(--p325-cyan);
            color: white;
            transform: translateY(-3px) scale(1.05);
        }

        .cover-preview {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding-left: 60px;
            z-index: 2;
        }

        .preview-item {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.2); 
            border-radius: 50% 20% 50% 20%; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 90px;
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        /* ===== STEP1 & STEP2 ===== */
        #step1, #step2 {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 40px;
        }

        .step-title {
            font-size: 36px;
            color: var(--text-dark);
            margin-bottom: 60px;
            font-weight: 600;
        }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            max-width: 800px;
        }

        .emoji-card {
            aspect-ratio: 1;
            background: white;
            border-radius: 30px; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 90px;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: 0.3s;
            border: 4px solid transparent;
        }

        .emoji-card:hover {
            transform: translateY(-15px);
            border-color: var(--p325-cyan);
        }

        .input-container {
            background: var(--parchment); 
            border-radius: 24px;
            padding: 50px;
            box-shadow: var(--shadow-xl);
            max-width: 600px;
            width: 100%;
            border: 1px solid #E6E0C8; 
        }

        textarea {
            width: 100%;
            height: 140px;
            padding: 20px;
            border: 2px solid #D8D2B9;
            border-radius: 16px;
            font-size: 17px;
            resize: none;
            background: rgba(255,255,255,0.7);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--button-gradient);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        /* ===== STEP3 動態牆 ===== */
        #step3 {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to bottom, #E0F7FA 0%, #E8F5E9 100%);
            padding: 40px;
        }

        .gallery-container {
            width: 95%;
            max-width: 1200px;
            height: 80vh;
            background: rgba(255, 255, 255, 0.6); 
            border-radius: 40px;
            box-shadow: var(--shadow-xl);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.5);
        }
        
        .canvas-area {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .message-card {
            position: absolute;
            background: var(--card-rock); 
            border-radius: 60px 40px 70px 50px / 50px 70px 40px 60px;
            padding: 20px 25px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            user-select: none;
            word-wrap: break-word;
            border: 3px solid #D7D7D0; 
            width: 240px;
            height: 170px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .card-number {
            position: absolute;
            top: 12px;
            left: 18px;
            font-size: 14px;
            color: rgba(0, 0, 0, 0.25);
            font-weight: 800;
        }

        .next-btn {
            position: absolute;
            bottom: 40px;
            right: 40px;
            padding: 15px 30px;
            background: var(--button-gradient);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            z-index: 100;
        }

        /* ===== 🔥 新增：STEP 4 祝福頁面樣式 🔥 ===== */
        #step4 {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--primary-gradient);
            padding: 40px;
            text-align: center;
        }

        .blessing-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 60px;
            border-radius: 40px;
            box-shadow: var(--shadow-xl);
            max-width: 700px;
            width: 90%;
            border: 4px double var(--p325-cyan);
            animation: slideInUp 1s ease-out;
        }

        .blessing-title {
            font-family: "Noto Serif TC", serif;
            font-size: 24px;
            color: var(--p360-green);
            margin-bottom: 30px;
            letter-spacing: 4px;
        }

        #blessing-text {
            font-family: "Noto Serif TC", serif;
            font-size: 32px;
            color: var(--text-dark);
            line-height: 1.8;
            margin-bottom: 40px;
            font-weight: 700;
        }

        .btn-restart {
            background: var(--p360-green);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-restart:hover {
            background: var(--p325-cyan);
            transform: scale(1.1);
        }

        /* 手機版適配 */
        @media (max-width: 768px) {
            .cover-title { font-size: 40px; }
            .message-card { width: 130px; height: 90px; }
            #blessing-text { font-size: 22px; }
            .blessing-container { padding: 40px 20px; }
        }
    </style>
</head>
<body>
    <div id="cover" class="page active">
        <div class="cover-content">
            <div class="cover-title">美崙溪記憶之牆</div>
            <div class="cover-subtitle">寫下你與這片水域的故事<br>讓每一抹思緒，化作水文間的洄盪</div>
            <button id="btn-start" class="btn-start">潛入溪流</button>
        </div>
        <div class="cover-preview">
            <div class="preview-item">🐟</div>
            <div class="preview-item">🌿</div>
            <div class="preview-item">⛰️</div>
            <div class="preview-item">💧</div>
        </div>
    </div>

    <div id="step1" class="page">
        <div class="step-title">請選擇代表你的溪流生靈</div>
        <div class="emoji-grid">
            <div class="emoji-card" data-emoji="🐟">🐟</div>
            <div class="emoji-card" data-emoji="🌿">🌿</div>
            <div class="emoji-card" data-emoji="⛰️">⛰️</div>
            <div class="emoji-card" data-emoji="💧">💧</div>
        </div>
    </div>

    <div id="step2" class="page">
        <div class="input-container">
            <div id="selectedEmojiDisplay" style="font-size: 70px; text-align: center; margin-bottom: 20px;"></div>
            <div class="step-title" style="font-size: 24px; margin-bottom: 20px; text-align: center;">你想對美崙溪說些什麼？</div>
            <textarea id="messageInput" placeholder="分享你的風景或回憶..." maxlength="50"></textarea>
            <button id="btn-submit" class="btn-submit">投入水中</button>
        </div>
    </div>

    <div id="step3" class="page">
        <div class="gallery-container">
            <div class="canvas-area" id="canvasArea"></div>
            <button id="btn-to-blessing" class="next-btn">重返岸邊</button>
        </div>
    </div>

    <div id="step4" class="page">
        <div class="blessing-container">
            <div class="blessing-title">—— 溪流的迴響 ——</div>
            <div id="blessing-text">願你的生活如美崙溪般生生不息。</div>
            <button id="btn-final-restart" class="btn-restart">再次開啟旅程</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAk7_r7HGijcFBzTjameuieXoSCrBwrg0g",
            authDomain: "uuu566-ec42d.firebaseapp.com",
            projectId: "uuu566-ec42d",
            storageBucket: "uuu566-ec42d.firebasestorage.app",
            messagingSenderId: "148385432205",
            appId: "1:148385432205:web:5055eaaab6206e8c6b98c4",
            measurementId: "G-215P1M3NYL"
        };

        const firebaseApp = initializeApp(firebaseConfig);
        const db = getFirestore(firebaseApp);

        // 10 種隨機祝福話語
        const blessings = [
            "願你的生活如美崙溪般生生不息。",
            "願溪水洗滌憂愁，帶回內心的寧靜。",
            "願你在生活的每個角落，都能遇見屬於自己的湧泉。",
            "根深葉茂，願你如河岸森林般韌性生長。",
            "如狐蝠尋得棲林，願你也找到心之所向的歸屬。",
            "清流潤心，願你的前程如溪水般明亮透徹。",
            "山高水長，願你歲月靜好，平安喜樂。",
            "如溪匯海，願你所有的努力終能成就壯闊。",
            "積蓄山澗之力，勇敢跨越每一道生命的轉折。",
            "每一顆石子都有故事，每一段生命都有光芒。"
        ];

        // 物理引擎
        class PhysicsCard {
            constructor(emoji, message, x, y, cw, ch) {
                this.emoji = emoji; this.message = message;
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 6; this.vy = Math.random();
                this.rot = Math.random() * 20 - 10; this.rv = (Math.random() - 0.5) * 0.12;
                const isMobile = window.innerWidth <= 768;
                this.w = isMobile ? 130 : 240; this.h = isMobile ? 90 : 170;
                this.grav = 0.35; this.fric = 0.99; this.bounce = 0.65;
                this.isRest = false; this.cw = cw; this.ch = ch; this.el = null;
            }
            update(cards) {
                if (this.isRest) return;
                this.vy += this.grav; this.x += this.vx; this.y += this.vy;
                this.vx *= this.fric; this.vy *= this.fric;
                this.rot += this.rv;
                if (this.x < 0) { this.x = 0; this.vx = Math.abs(this.vx) * this.bounce; }
                if (this.x + this.w > this.cw) { this.x = this.cw - this.w; this.vx = -Math.abs(this.vx) * this.bounce; }
                if (this.y + this.h >= this.ch) {
                    this.y = this.ch - this.h; this.vy *= -this.bounce;
                    if (Math.abs(this.vy) < 1.5) this.isRest = true;
                }
            }
        }

        const app = {
            currentEmoji: null,
            cards: [],
            isSubmitting: false,
            init() {
                this.bindEvents();
                this.animate();
            },
            bindEvents() {
                document.getElementById('btn-start').onclick = () => this.goToStep(1);
                document.querySelectorAll('.emoji-card').forEach(card => {
                    card.onclick = (e) => this.selectEmoji(e.currentTarget.dataset.emoji);
                });
                document.getElementById('btn-submit').onclick = () => this.submitMessage();
                
                // 重返岸邊 -> 顯示隨機祝福
                document.getElementById('btn-to-blessing').onclick = () => {
                    const randomIdx = Math.floor(Math.random() * blessings.length);
                    document.getElementById('blessing-text').textContent = blessings[randomIdx];
                    this.goToStep(4);
                };

                document.getElementById('btn-final-restart').onclick = () => this.goToStep(1);
            },
            goToStep(step) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                const target = document.getElementById('step' + step);
                if(step === 0) document.getElementById('cover').classList.add('active');
                else target.classList.add('active');
                if(step === 3) this.fetchWall();
            },
            selectEmoji(emoji) {
                this.currentEmoji = emoji;
                document.getElementById('selectedEmojiDisplay').textContent = emoji;
                this.goToStep(2);
            },
            async submitMessage() {
                if (this.isSubmitting) return;
                const text = document.getElementById('messageInput').value.trim();
                if (!text || !this.currentEmoji) return;
                this.isSubmitting = true;
                try {
                    await addDoc(collection(db, "messages"), {
                        emoji: this.currentEmoji, message: text, timestamp: Date.now()
                    });
                    document.getElementById('messageInput').value = '';
                    this.isSubmitting = false;
                    this.goToStep(3);
                } catch (e) { alert('連線失敗'); this.isSubmitting = false; }
            },
            async fetchWall() {
                const canvas = document.getElementById('canvasArea');
                canvas.innerHTML = '<div style="color:var(--text-dark); text-align:center; padding-top:50px;">水文記憶撈取中...</div>';
                this.cards = [];
                try {
                    const q = query(collection(db, "messages"), orderBy("timestamp", "desc"), limit(20));
                    const snap = await getDocs(q);
                    const data = [];
                    snap.forEach(doc => data.push(doc.data()));
                    data.reverse();
                    canvas.innerHTML = '';
                    const cw = canvas.offsetWidth, ch = canvas.offsetHeight;
                    data.forEach((d, i) => {
                        setTimeout(() => {
                            const card = new PhysicsCard(d.emoji, d.message, Math.random()*(cw-150), -200, cw, ch);
                            const el = document.createElement('div');
                            el.className = 'message-card';
                            el.innerHTML = `<div class="card-number">#${i+1}</div><span style="font-size:28px;">${card.emoji}</span><div style="font-size:14px; margin-top:10px;">${card.message}</div>`;
                            canvas.appendChild(el);
                            card.el = el;
                            this.cards.push(card);
                        }, i * 200);
                    });
                } catch (e) { canvas.innerHTML = '載入失敗'; }
            },
            animate() {
                const canvas = document.getElementById('canvasArea');
                if (document.getElementById('step3').classList.contains('active')) {
                    this.cards.forEach(c => {
                        c.update();
                        if (c.el) {
                            c.el.style.left = c.x + 'px';
                            c.el.style.top = c.y + 'px';
                            c.el.style.transform = `rotate(${c.rot}deg)`;
                        }
                    });
                }
                requestAnimationFrame(() => this.animate());
            }
        };
        app.init();
    </script>
</body>
</html>
