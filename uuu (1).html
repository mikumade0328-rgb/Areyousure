<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ForMoSa 花蓮美崙溪流域文化重織與韌性水路</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --p325-cyan: #55C6D9;
    --p360-green: #00AF3F;
    --river-deep: #1B6F79;
    --river-night: #173D45;
    --moss: #5D8B4F;
    --silt: #B9B49D;
    --bg-mist: #F0F8F7;
    --card-rock: #ECECE7;
    --text-dark: #2C3E50;
    --parchment: #FCFAF2;
    --primary-gradient: linear-gradient(135deg, var(--p325-cyan) 0%, #A8E6CF 50%, var(--p360-green) 100%);
    --button-gradient: linear-gradient(135deg, var(--p360-green) 0%, var(--p325-cyan) 100%);
    --shadow-sm: 0 4px 6px rgba(0, 0, 0, .07);
    --shadow-lg: 0 15px 30px rgba(0, 175, 63, .15);
    --shadow-xl: 0 20px 40px rgba(0, 0, 0, .2);
}

body {
    font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
    overflow: hidden;
    background: var(--bg-mist);
    color: var(--text-dark);
}

button,
textarea {
    font: inherit;
}

.page {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transform: scale(1.05);
    transition: opacity .5s ease, transform .5s ease, visibility .5s;
    z-index: 1;
}

.page.active {
    opacity: 1;
    visibility: visible;
    transform: scale(1);
    z-index: 10;
}

#cover {
    background: var(--primary-gradient);
    justify-content: space-between;
    padding: 60px 80px;
    position: relative;
    overflow: hidden;
}

#cover::before {
    content: "";
    position: absolute;
    bottom: -50px;
    left: 0;
    width: 100%;
    height: 300px;
    background: rgba(255, 255, 255, .12);
    border-radius: 50% 50% 0 0;
}

#cover::after {
    content: "";
    position: absolute;
    inset: auto -20% -26% -20%;
    height: 50%;
    background: radial-gradient(ellipse at center, rgba(255,255,255,.28), rgba(255,255,255,0) 68%);
    animation: slowDrift 12s ease-in-out infinite;
}

.cover-content {
    flex: 1;
    color: white;
    z-index: 2;
}

.cover-title {
    font-size: clamp(42px, 6vw, 72px);
    font-weight: 700;
    letter-spacing: 0;
    margin-bottom: 20px;
}

.cover-subtitle {
    font-size: 20px;
    line-height: 1.8;
    margin-bottom: 40px;
}

.btn-start,
.btn-submit,
.next-btn,
.btn-restart {
    border: none;
    cursor: pointer;
    transition: transform .25s ease, filter .25s ease, background .25s ease;
}

.btn-start {
    padding: 18px 50px;
    border-radius: 999px;
    background: white;
    color: var(--p360-green);
    font-size: 18px;
    font-weight: 700;
}

.btn-start:hover,
.btn-submit:hover,
.next-btn:hover,
.btn-restart:hover {
    transform: translateY(-4px);
    filter: brightness(1.03);
}

.cover-preview {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
    width: 100%;
    max-width: 500px;
    z-index: 2;
}

.preview-item {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 90px;
    background: rgba(255, 255, 255, .18);
    border-radius: 32px;
    backdrop-filter: blur(5px);
    animation: float 6s ease-in-out infinite;
}

.preview-item:nth-child(2) {
    animation-delay: 1s;
}

.preview-item:nth-child(3) {
    animation-delay: 2s;
}

.preview-item:nth-child(4) {
    animation-delay: 3s;
}

@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
}

@keyframes slowDrift {
    0%, 100% { transform: translateX(-4%); }
    50% { transform: translateX(4%); }
}

#step1,
#step2 {
    background: linear-gradient(to bottom, var(--bg-mist) 0%, #E0F2F1 100%);
    padding: 60px 20px;
}

.step-title {
    font-size: 36px;
    margin-bottom: 40px;
    letter-spacing: 0;
}

.emoji-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 30px;
    max-width: 800px;
}

.emoji-card {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 90px;
    background: white;
    border-radius: 26px;
    cursor: pointer;
    transition: transform .3s ease, box-shadow .3s ease;
    box-shadow: var(--shadow-sm);
}

.emoji-card:hover {
    transform: translateY(-10px);
    box-shadow: var(--shadow-lg);
}

.input-container {
    width: 100%;
    max-width: 650px;
    background: var(--parchment);
    border-radius: 24px;
    padding: 40px;
    box-shadow: var(--shadow-xl);
}

textarea {
    width: 100%;
    height: 140px;
    resize: none;
    padding: 20px;
    border-radius: 18px;
    border: 2px solid #ddd;
    font-size: 17px;
    line-height: 1.6;
    background: rgba(255,255,255,.9);
}

textarea:focus {
    outline: none;
    border-color: var(--p360-green);
}

.char-count {
    text-align: right;
    margin-top: 8px;
    color: rgba(44,62,80,.65);
}

.btn-submit {
    width: 100%;
    margin-top: 18px;
    padding: 16px;
    border-radius: 999px;
    background: var(--button-gradient);
    color: white;
    font-size: 18px;
    font-weight: 700;
}

#step3 {
    background:
        radial-gradient(circle at 72% 18%, rgba(85,198,217,.26), transparent 26%),
        linear-gradient(140deg, #D7F2EC 0%, #E9F7EA 42%, #B9DCD9 100%);
    padding: clamp(18px, 3vw, 38px);
    overflow: hidden;
}

.wall-shell {
    width: min(1500px, 96vw);
    height: min(860px, 88vh);
    display: grid;
    grid-template-columns: minmax(220px, 330px) minmax(0, 1fr);
    gap: clamp(18px, 3vw, 36px);
    align-items: stretch;
}

.wall-aside {
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: clamp(24px, 3vw, 42px) 0;
    color: var(--river-night);
}

.wall-kicker {
    writing-mode: vertical-rl;
    align-self: flex-start;
    font-size: 14px;
    letter-spacing: .18em;
    color: rgba(23,61,69,.58);
}

.wall-title {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    align-self: center;
    max-height: 66vh;
    font-size: clamp(34px, 5vw, 68px);
    line-height: 1.1;
    font-weight: 800;
    letter-spacing: .08em;
}

.wall-meta {
    width: 100%;
    display: grid;
    gap: 12px;
    font-size: 14px;
    color: rgba(23,61,69,.7);
}

.wall-meta span {
    display: block;
    height: 2px;
    width: 100%;
    background: linear-gradient(90deg, var(--river-deep), rgba(27,111,121,0));
}

.gallery-container {
    min-width: 0;
    height: 100%;
    background:
        linear-gradient(110deg, rgba(255,255,255,.58), rgba(255,255,255,.28)),
        linear-gradient(180deg, rgba(85,198,217,.16), rgba(0,175,63,.12));
    border: 1px solid rgba(255,255,255,.72);
    border-radius: 28px;
    overflow: hidden;
    position: relative;
    backdrop-filter: blur(14px);
    box-shadow: 0 24px 70px rgba(21,91,101,.22);
}

.gallery-container::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
        repeating-linear-gradient(100deg, rgba(255,255,255,.16) 0 2px, transparent 2px 52px),
        radial-gradient(ellipse at 50% 102%, rgba(92,118,76,.32), transparent 45%);
    mix-blend-mode: screen;
    opacity: .7;
}

.canvas-area {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
    isolation: isolate;
}

.canvas-area::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
        linear-gradient(90deg, rgba(255,255,255,.18), transparent 32%, rgba(255,255,255,.13) 68%, transparent),
        repeating-radial-gradient(ellipse at 50% 120%, rgba(32,91,84,.18) 0 2px, transparent 2px 28px);
    animation: waterSweep 10s linear infinite;
    z-index: 0;
}

.canvas-empty {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(23,61,69,.72);
    font-size: clamp(18px, 2vw, 25px);
    z-index: 2;
}

@keyframes waterSweep {
    from { background-position: 0 0, 0 0; }
    to { background-position: 240px 0, 0 48px; }
}

.message-card {
    position: absolute;
    width: 230px;
    min-height: 154px;

    border-radius: 28px 32px 25px 35px;
    background:

        linear-gradient(145deg, #F2F1EA, #CFCDBE 58%, #B8B5A3 100%);
    box-shadow:
        inset -10px -12px 24px rgba(78,76,60,.15),
        inset 10px 12px 20px rgba(255,255,255,.42),
        0 14px 26px rgba(28,63,58,.2);
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    will-change: transform, left, top;
    z-index: 2;
    user-select: none;
}

.message-card::after {
    content: "";
    position: absolute;
    inset: 9px;
    border-radius: inherit;
    border: 1px solid rgba(255,255,255,.32);
    pointer-events: none;
}

.card-number {
    position: absolute;
    top: 13px;
    left: 18px;
    font-size: 12px;
    color: rgba(38,52,48,.38);
}

.message-emoji {
    font-size: 34px;
    line-height: 1;
    margin-bottom: 10px;

}

.message-text {
    width: 100%;
    color: #34433F;
    line-height: 1.5;
    font-size: 16px;
    overflow: hidden;
    overflow-wrap: anywhere;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
}

.next-btn {
    position: absolute;
    right: 26px;
    bottom: 24px;
    padding: 15px 28px;
    border-radius: 999px;
    background: var(--button-gradient);
    color: white;
    font-weight: 700;
    box-shadow: 0 12px 28px rgba(0,90,90,.22);
    z-index: 4;
}

#step4 {
    background: var(--primary-gradient);
}

.blessing-container {
    width: 90%;
    max-width: 700px;
    background: rgba(255, 255, 255, .96);
    padding: 60px;
    border-radius: 34px;
    text-align: center;
    box-shadow: var(--shadow-xl);
}

.blessing-title {
    color: var(--p360-green);
    margin-bottom: 30px;
    font-size: 24px;
}

#blessing-text {
    font-size: 32px;
    line-height: 1.8;
    margin-bottom: 40px;
}

.btn-restart {
    padding: 16px 36px;
    border-radius: 999px;
    background: var(--p360-green);
    color: white;
    font-weight: 700;
}

@media (max-width: 900px) {
    #cover {
        padding: 40px 20px;
        text-align: center;
    }

    .cover-preview {
        margin-top: 30px;
    }

    .preview-item {
        font-size: 60px;
        border-radius: 24px;
    }

    .step-title {
        font-size: 26px;
        text-align: center;
    }

    .emoji-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
    }

    .emoji-card {
        font-size: 60px;
        border-radius: 22px;
    }

    .wall-shell {
        height: 92vh;
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 14px;
    }

    .wall-aside {
        min-height: auto;
        flex-direction: row;
        align-items: end;
        padding: 0 4px;
    }

    .wall-kicker,
    .wall-title {
        writing-mode: horizontal-tb;
        text-orientation: initial;
    }

    .wall-title {
        font-size: 28px;
        line-height: 1.2;
        letter-spacing: 0;
    }

    .wall-meta {
        display: none;
    }

    .gallery-container {
        border-radius: 22px;
    }

    .message-card {
        width: 132px;
        min-height: 92px;
        padding: 12px 10px 10px;
        border-radius: 18px 21px 16px 20px;
    }

    .card-number {
        top: 7px;
        left: 10px;
        font-size: 10px;
    }

    .message-emoji {
        font-size: 20px;
        margin-bottom: 5px;
    }

    .message-text {
        font-size: 12px;
        line-height: 1.35;
        -webkit-line-clamp: 2;
    }

    .next-btn {
        right: 16px;
        bottom: 16px;
        padding: 12px 20px;
    }

    .input-container,
    .blessing-container {
        padding: 32px 22px;
        border-radius: 24px;
    }

    #blessing-text {
        font-size: 22px;
    }
}
</style>

<script type="module">

const fallbackMessages = [
    { emoji: "水", message: "今天的水聲很安靜。" },
    { emoji: "草", message: "希望河岸一直是柔軟的。" },
    { emoji: "山", message: "從山到海都有人記得。" },
    { emoji: "魚", message: "願每次回游都有路。" },
    { emoji: "水", message: "把焦慮放進溪裡。" },
    { emoji: "草", message: "願生活慢慢發芽。" }
];

function escapeHTML(value) {
    return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
    }[char]));
}

class PhysicsCard {
    constructor(emoji, message, x, y, cw, ch, index) {
        const mobile = window.innerWidth <= 900;
        this.emoji = emoji;
        this.message = message;
        this.x = x;
        this.y = y;
        this.w = mobile ? 132 : 230;
        this.h = mobile ? 92 : 154;
        this.vx = (Math.random() - .5) * 5.2;
        this.vy = Math.random() * .8;
        this.rot = Math.random() * 22 - 11;
        this.rv = (Math.random() - .5) * .22;
        this.mass = 1 + Math.random() * .3;
        this.grav = mobile ? .34 : .42;
        this.air = .985;
        this.surfaceFriction = .86;
        this.bounce = .16;
        this.cw = cw;
        this.ch = ch;
        this.sleepFrames = 0;
        this.isRest = false;
        this.index = index;
    }

    tick(cards) {
        if (this.isRest) return;

        this.vy += this.grav;
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= this.air;
        this.vy *= this.air;
        this.rot += this.rv;
        this.rv *= .94;

        this.keepInside();

        for (let i = 0; i < 4; i += 1) {
            for (const other of cards) {
                if (other === this) continue;
                this.resolveCollision(other);
            }
        }

        this.checkSleep();
    }

    keepInside() {
        if (this.x < 0) {
            this.x = 0;
            this.vx = Math.abs(this.vx) * this.bounce;
        }

        if (this.x + this.w > this.cw) {
            this.x = this.cw - this.w;
            this.vx = -Math.abs(this.vx) * this.bounce;
        }

        if (this.y < -260) {
            this.y = -260;
            this.vy = Math.max(this.vy, 0);
        }

        if (this.y + this.h >= this.ch) {
            this.y = this.ch - this.h;
            this.vy = -Math.abs(this.vy) * this.bounce;
            this.vx *= this.surfaceFriction;
            this.rv *= .74;
        }
    }

    resolveCollision(other) {
        const ax = this.x + this.w / 2;
        const ay = this.y + this.h / 2;
        const bx = other.x + other.w / 2;
        const by = other.y + other.h / 2;
        const dx = ax - bx;
        const dy = ay - by;
        const overlapX = (this.w + other.w) / 2 - Math.abs(dx);
        const overlapY = (this.h + other.h) / 2 - Math.abs(dy);

        if (overlapX <= 0 || overlapY <= 0) return;

        const axisX = overlapX < overlapY;
        const dir = axisX ? Math.sign(dx || .01) : Math.sign(dy || .01);
        const push = axisX ? overlapX : overlapY;
        const totalMass = this.mass + other.mass;
        const thisShare = other.mass / totalMass;
        const otherShare = this.mass / totalMass;
        const slop = .8;
        const correction = Math.max(0, push - slop);

        if (axisX) {
            this.x += dir * correction * thisShare;
            other.x -= dir * correction * otherShare;
            const impulse = (this.vx - other.vx) * .22;
            this.vx -= impulse;
            other.vx += impulse;
        } else {
            this.y += dir * correction * thisShare;
            other.y -= dir * correction * otherShare;
            const impulse = (this.vy - other.vy) * .18;
            this.vy -= impulse;
            other.vy += impulse;
            this.vx += dir * .05;
            other.vx -= dir * .05;
        }

        this.rv += dir * .006;
        other.rv -= dir * .006;
        this.isRest = false;
        other.isRest = false;
        this.sleepFrames = 0;
        other.sleepFrames = 0;
        this.keepInside();
        other.keepInside();
    }

    checkSleep() {
        const onFloor = this.y + this.h >= this.ch - .75;
        const calm = Math.abs(this.vx) < .055 && Math.abs(this.vy) < .08 && Math.abs(this.rv) < .004;

        if (onFloor && calm) {
            this.sleepFrames += 1;
        } else {
            this.sleepFrames = 0;
        }

        if (this.sleepFrames > 42) {
            this.isRest = true;
            this.vx = 0;
            this.vy = 0;
            this.rv = 0;
        }
    }
}

const app = {
    currentEmoji: null,
    cards: [],
    isSubmitting: false,
    wallToken: 0,

    init() {
        this.bind();
        this.animate();
    },

    bind() {
        document.getElementById("btn-start").onclick = () => this.go(1);

        document.querySelectorAll(".emoji-card").forEach(card => {
            card.onclick = event => this.selectEmoji(event.currentTarget.dataset.emoji);
        });

        document.getElementById("messageInput").oninput = () => this.updateCount();
        document.getElementById("btn-submit").onclick = () => this.submit();
        document.getElementById("btn-to-blessing").onclick = () => this.showBlessing();
        document.getElementById("btn-final-restart").onclick = () => this.go(0);

        window.addEventListener("resize", () => this.resizeCards());
    },

    go(step) {
        document.querySelectorAll(".page").forEach(page => page.classList.remove("active"));
        const target = step === 0 ? "cover" : "step" + step;
        document.getElementById(target).classList.add("active");

        if (step === 3) {
            this.fetchWall();
        }
    },

    selectEmoji(emoji) {
        this.currentEmoji = emoji;
        document.getElementById("selectedEmojiDisplay").textContent = emoji;
        this.go(2);
    },

    updateCount() {
        document.getElementById("charCount").textContent = document.getElementById("messageInput").value.length;
    },

    async submit() {
        if (this.isSubmitting) return;

        const input = document.getElementById("messageInput");
        const text = input.value.trim();

        if (!text || !this.currentEmoji) return;

        this.isSubmitting = true;

        const btn = document.getElementById("btn-submit");
        btn.textContent = "投入溪流中...";

        try {
            await addDoc(collection(db, "messages"), {
                emoji: this.currentEmoji,
                message: text,
                timestamp: serverTimestamp()
            });
        } catch (err) {
            console.warn("Firebase write failed, rendering locally.", err);
            fallbackMessages.push({
                emoji: this.currentEmoji,
                message: text
            });
        }

        input.value = "";
        this.updateCount();
        btn.textContent = "投入水中";
        this.isSubmitting = false;
        this.go(3);
    },

    showBlessing() {
        const idx = Math.floor(Math.random() * blessings.length);
        document.getElementById("blessing-text").innerText = blessings[idx];
        this.go(4);
    },

    async fetchWall() {
        const token = ++this.wallToken;
        const canvas = document.getElementById("canvasArea");
        canvas.innerHTML = '<div class="canvas-empty">水文記憶撈取中...</div>';
        this.cards = [];

        let data = [];

        try {
            const q = query(collection(db, "messages"), orderBy("timestamp", "desc"), limit(24));
            const snap = await getDocs(q);
            snap.forEach(doc => data.push(doc.data()));
            data.reverse();
        } catch (err) {
            console.warn("Firebase read failed, using fallback messages.", err);
        }

        if (!data.length) {
            data = fallbackMessages;
        }

        if (token !== this.wallToken) return;

        canvas.innerHTML = "";
        this.dropCards(data);
    },

    dropCards(data) {
        const canvas = document.getElementById("canvasArea");
        const cw = canvas.offsetWidth;
        const ch = canvas.offsetHeight;
        const mobile = window.innerWidth <= 900;
        const cardWidth = mobile ? 132 : 230;
        const gutter = mobile ? 12 : 24;

        data.forEach((item, i) => {
            setTimeout(() => {
                if (!document.getElementById("step3").classList.contains("active")) return;

                const spread = Math.max(gutter, cw - cardWidth - gutter * 2);
                const startX = gutter + ((i * (cardWidth * .72)) % spread);
                const jitter = (Math.random() - .5) * Math.min(120, spread * .18);
                const card = new PhysicsCard(
                    item.emoji || "水",
                    item.message || "",
                    Math.max(gutter, Math.min(cw - cardWidth - gutter, startX + jitter)),
                    -190 - Math.random() * 90,
                    cw,
                    ch,
                    i
                );

                const el = document.createElement("div");
                el.className = "message-card";
                el.innerHTML = `
                    <div class="card-number">#${i + 1}</div>
                    <div class="message-emoji">${escapeHTML(card.emoji)}</div>
                    <div class="message-text">${escapeHTML(card.message)}</div>
                `;

                canvas.appendChild(el);
                card.el = el;
                this.cards.push(card);
            }, i * 160);
        });
    },

    resizeCards() {
        const canvas = document.getElementById("canvasArea");
        if (!canvas || !this.cards.length) return;

        const cw = canvas.offsetWidth;
        const ch = canvas.offsetHeight;
        const mobile = window.innerWidth <= 900;

        this.cards.forEach(card => {
            card.cw = cw;
            card.ch = ch;
            card.w = mobile ? 132 : 230;
            card.h = mobile ? 92 : 154;
            card.x = Math.min(card.x, Math.max(0, cw - card.w));
            card.y = Math.min(card.y, Math.max(0, ch - card.h));
            card.isRest = false;
            card.sleepFrames = 0;
        });
    },

    animate() {
        if (document.getElementById("step3").classList.contains("active")) {
            this.cards.forEach(card => {
                card.tick(this.cards);

                if (card.el) {
                    card.el.style.left = `${card.x}px`;
                    card.el.style.top = `${card.y}px`;
                    card.el.style.transform = `rotate(${card.rot}deg)`;
                }
            });
        }

        requestAnimationFrame(() => this.animate());
    }
};

app.init();
</script>
</body>
