<!DOCTYPE html>

<title>ForMoSa 花蓮美崙溪流域文化重織與韌性水路</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --white: #FFFFFF;
    --mist: #F2FAFA;
    --ice-blue: #DFF5FA;
    --water-blue: #55C6D9;
    --soft-green: #CFEED9;
    --green: #00AF3F;
    --deep: #174A55;
    --text: #243D42;
    --shadow: 0 20px 45px rgba(23, 74, 85, .16);
}

body {
    font-family: "Microsoft JhengHei", sans-serif;
    overflow: hidden;
    background: var(--mist);
    color: var(--text);
}

button,
textarea {
    font: inherit;
}

.page {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transform: scale(1.03);
    transition: opacity .45s ease, transform .45s ease, visibility .45s;
    z-index: 1;
}

.page.active {
    opacity: 1;
    visibility: visible;
    transform: scale(1);
    z-index: 10;
}

#cover {
    justify-content: flex-end;
    align-items: stretch;
    padding: clamp(24px, 4vw, 64px);
    background:
        linear-gradient(90deg, rgba(15, 66, 75, .76), rgba(15, 66, 75, .22) 55%, rgba(255,255,255,.1)),
        url("https://commons.wikimedia.org/wiki/Special:Redirect/file/Meilun%20River%20%E7%BE%8E%E5%B4%99%E6%BA%AA%20%EF%BC%88Hualien%2C%20Taiwan%29.jpg") center / cover no-repeat;
}

.cover-content {
    position: relative;
    z-index: 2;
    width: min(760px, 100%);
    color: var(--white);
}

.cover-title {
    font-size: clamp(46px, 7vw, 86px);
    line-height: 1.05;
    font-weight: 800;
    letter-spacing: 0;
    margin-bottom: 18px;
}

.cover-subtitle {
    font-size: clamp(18px, 2vw, 24px);
    line-height: 1.8;
    margin-bottom: 32px;
}

.intro-panel {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
    margin-bottom: 28px;
}

.intro-item {
    min-height: 92px;
    padding: 18px;
    border-radius: 8px;
    background: rgba(255,255,255,.9);
    color: var(--deep);
    box-shadow: 0 12px 28px rgba(0,0,0,.1);
}

.intro-item strong {
    display: block;
    margin-bottom: 8px;
    color: var(--green);
    font-size: 16px;
}

.intro-item span {
    display: block;
    font-size: 14px;
    line-height: 1.55;
}

.photo-credit {
    position: absolute;
    right: 18px;
    bottom: 12px;
    color: rgba(255,255,255,.78);
    font-size: 11px;
}

.btn-start,
.btn-submit,
.next-btn,
.btn-restart {
    border: 0;
    cursor: pointer;
    border-radius: 999px;
    font-weight: 700;
    transition: transform .2s ease, filter .2s ease;
}

.btn-start {
    padding: 16px 42px;
    background: var(--white);
    color: var(--green);
    font-size: 18px;
}

.btn-start:hover,
.btn-submit:hover,
.next-btn:hover,
.btn-restart:hover {

}

#step1,
#step2 {

}

@keyframes waterMove {

}

.canvas-empty {

}

<script type="module">

let db = null;
let firebaseAPI = null;

async function initFirebase() {
    if (firebaseAPI && db) return true;

    try {
        const appModule = await import("https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js");
        const firestoreModule = await import("https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js");
        const firebaseApp = appModule.initializeApp(firebaseConfig);
        db = firestoreModule.getFirestore(firebaseApp);
        firebaseAPI = firestoreModule;
        return true;
    } catch (err) {
        console.warn("Firebase unavailable, using local exhibition mode.", err);
        return false;
    }
}

const blessings = [
    "願你的生活如美崙溪般生生不息。",
    "願溪水洗滌憂愁，帶回內心的寧靜。",

const fallbackMessages = [
    { emoji: "💧", message: "今天的水聲很安靜。" },
    { emoji: "🌿", message: "希望河岸一直是柔軟的。" },
    { emoji: "⛰️", message: "從山到海都有人記得。" },
    { emoji: "🐟", message: "願每次回游都有路。" },
    { emoji: "💧", message: "把焦慮放進溪裡。" },
    { emoji: "🌿", message: "願生活慢慢發芽。" }
];

const maxMessages = 15;

function escapeHTML(value) {
    return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
    }[char]));
}

class PhysicsCard {
    constructor(emoji, message, x, y, cw, ch) {
        const mobile = window.innerWidth <= 900;
        this.emoji = emoji;
        this.message = message;
        this.x = x;
        this.y = y;
        this.w = mobile ? 132 : 230;
        this.h = mobile ? 92 : 152;
        this.vx = (Math.random() - .5) * 4.8;
        this.vy = Math.random() * .8;
        this.mass = 1 + Math.random() * .25;
        this.grav = mobile ? .34 : .42;
        this.air = .985;
        this.surfaceFriction = .86;
        this.bounce = .16;
        this.cw = cw;
        this.ch = ch;
        this.sleepFrames = 0;
        this.isRest = false;
    }

    tick(cards) {
        if (this.isRest) return;

        this.vy += this.grav;
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= this.air;
        this.vy *= this.air;

        this.keepInside();

        for (let i = 0; i < 4; i += 1) {
            for (const other of cards) {
                if (other !== this) this.resolveCollision(other);
            }
        }

        this.checkSleep();
    }

    keepInside() {
        if (this.x < 0) {
            this.x = 0;
            this.vx = Math.abs(this.vx) * this.bounce;
        }

        if (this.x + this.w > this.cw) {
            this.x = this.cw - this.w;
            this.vx = -Math.abs(this.vx) * this.bounce;
        }

        if (this.y + this.h >= this.ch) {
            this.y = this.ch - this.h;
            this.vy = -Math.abs(this.vy) * this.bounce;
            this.vx *= this.surfaceFriction;
        }
    }

    resolveCollision(other) {
        const ax = this.x + this.w / 2;
        const ay = this.y + this.h / 2;
        const bx = other.x + other.w / 2;
        const by = other.y + other.h / 2;
        const dx = ax - bx;
        const dy = ay - by;
        const overlapX = (this.w + other.w) / 2 - Math.abs(dx);
        const overlapY = (this.h + other.h) / 2 - Math.abs(dy);

        if (overlapX <= 0 || overlapY <= 0) return;

        const axisX = overlapX < overlapY;
        const dir = axisX ? Math.sign(dx || .01) : Math.sign(dy || .01);
        const correction = Math.max(0, (axisX ? overlapX : overlapY) - .8);
        const totalMass = this.mass + other.mass;
        const thisShare = other.mass / totalMass;
        const otherShare = this.mass / totalMass;

        if (axisX) {
            this.x += dir * correction * thisShare;
            other.x -= dir * correction * otherShare;
            const impulse = (this.vx - other.vx) * .22;
            this.vx -= impulse;
            other.vx += impulse;
        } else {
            this.y += dir * correction * thisShare;
            other.y -= dir * correction * otherShare;
            const impulse = (this.vy - other.vy) * .18;
            this.vy -= impulse;
            other.vy += impulse;
            this.vx += dir * .04;
            other.vx -= dir * .04;
        }

        this.isRest = false;
        other.isRest = false;
        this.sleepFrames = 0;
        other.sleepFrames = 0;
        this.keepInside();
        other.keepInside();
    }

    checkSleep() {
        const onFloor = this.y + this.h >= this.ch - .75;
        const calm = Math.abs(this.vx) < .055 && Math.abs(this.vy) < .08;

        if (onFloor && calm) {
            this.sleepFrames += 1;
        } else {
            this.sleepFrames = 0;
        }

        if (this.sleepFrames > 42) {
            this.isRest = true;
            this.vx = 0;
            this.vy = 0;
        }
    }
}

const app = {
    currentEmoji: null,
    cards: [],
    isSubmitting: false,
    wallToken: 0,

    init() {
        this.bind();
        this.animate();
    },

    bind() {
        document.getElementById("btn-start").onclick = () => this.go(1);
        document.querySelectorAll(".emoji-card").forEach(card => {
            card.onclick = event => this.selectEmoji(event.currentTarget.dataset.emoji);
        });
        document.getElementById("messageInput").oninput = () => this.updateCount();
        document.getElementById("btn-submit").onclick = () => this.submit();
        document.getElementById("btn-to-blessing").onclick = () => this.showBlessing();
        document.getElementById("btn-final-restart").onclick = () => this.go(0);
        window.addEventListener("resize", () => this.resizeCards());
    },

    go(step) {
        document.querySelectorAll(".page").forEach(page => page.classList.remove("active"));
        const target = step === 0 ? "cover" : "step" + step;
        document.getElementById(target).classList.add("active");

        if (step === 3) this.fetchWall();
    },

    selectEmoji(emoji) {
        this.currentEmoji = emoji;
        document.getElementById("selectedEmojiDisplay").textContent = emoji;
        this.go(2);
    },

    updateCount() {
        document.getElementById("charCount").textContent = document.getElementById("messageInput").value.length;
    },

    async submit() {
        if (this.isSubmitting) return;

        const input = document.getElementById("messageInput");
        const text = input.value.trim();

        if (!text || !this.currentEmoji) return;

        this.isSubmitting = true;
        const btn = document.getElementById("btn-submit");
        btn.textContent = "送出中...";

        try {
            if (!await initFirebase()) throw new Error("Firebase unavailable");
            await firebaseAPI.addDoc(firebaseAPI.collection(db, "messages"), {
                emoji: this.currentEmoji,
                message: text,
                timestamp: firebaseAPI.serverTimestamp()
            });
        } catch (err) {
            console.warn("Firebase write failed, rendering locally.", err);
            fallbackMessages.push({
                emoji: this.currentEmoji,
                message: text
            });

            while (fallbackMessages.length > maxMessages) {
                fallbackMessages.shift();
            }
        }

        input.value = "";
        this.updateCount();
        btn.textContent = "送出留言";
        this.isSubmitting = false;
        this.go(3);
    },

    showBlessing() {
        const idx = Math.floor(Math.random() * blessings.length);
        document.getElementById("blessing-text").innerText = blessings[idx];
        this.go(4);
    },

    async fetchWall() {
        const token = ++this.wallToken;
        const canvas = document.getElementById("canvasArea");
        canvas.innerHTML = '<div class="canvas-empty">讀取留言中...</div>';
        this.cards = [];

        let data = [];

        try {
            if (!await initFirebase()) throw new Error("Firebase unavailable");
            const q = firebaseAPI.query(
                firebaseAPI.collection(db, "messages"),
                firebaseAPI.orderBy("timestamp", "desc"),
                firebaseAPI.limit(maxMessages)
            );
            const snap = await firebaseAPI.getDocs(q);
            snap.forEach(doc => data.push(doc.data()));
            data.reverse();
        } catch (err) {
            console.warn("Firebase read failed, using fallback messages.", err);
        }

        if (!data.length) data = fallbackMessages;
        data = data.slice(-maxMessages);
        if (token !== this.wallToken) return;

        canvas.innerHTML = "";
        this.dropCards(data);
    },

    dropCards(data) {
        const canvas = document.getElementById("canvasArea");
        const cw = canvas.offsetWidth;
        const ch = canvas.offsetHeight;
        const mobile = window.innerWidth <= 900;
        const cardWidth = mobile ? 132 : 230;
        const gutter = mobile ? 12 : 24;

        data.forEach((item, i) => {
            setTimeout(() => {
                if (!document.getElementById("step3").classList.contains("active")) return;

                const spread = Math.max(gutter, cw - cardWidth - gutter * 2);
                const startX = gutter + ((i * (cardWidth * .72)) % spread);
                const jitter = (Math.random() - .5) * Math.min(110, spread * .18);
                const card = new PhysicsCard(
                    item.emoji || "💧",
                    item.message || "",
                    Math.max(gutter, Math.min(cw - cardWidth - gutter, startX + jitter)),
                    -190 - Math.random() * 80,
                    cw,
                    ch
                );

                const el = document.createElement("div");
                el.className = `message-card tone-${i % 3}`;
                el.innerHTML = `
                    <div class="card-number">#${i + 1}</div>
                    <div class="message-emoji">${escapeHTML(card.emoji)}</div>
                    <div class="message-text">${escapeHTML(card.message)}</div>
                `;

                canvas.appendChild(el);
                card.el = el;
                this.cards.push(card);
            }, i * 150);
        });
    },

    resizeCards() {
        const canvas = document.getElementById("canvasArea");
        if (!canvas || !this.cards.length) return;

        const cw = canvas.offsetWidth;
        const ch = canvas.offsetHeight;
        const mobile = window.innerWidth <= 900;

        this.cards.forEach(card => {
            card.cw = cw;
            card.ch = ch;
            card.w = mobile ? 132 : 230;
            card.h = mobile ? 92 : 152;
            card.x = Math.min(card.x, Math.max(0, cw - card.w));
            card.y = Math.min(card.y, Math.max(0, ch - card.h));
            card.isRest = false;
            card.sleepFrames = 0;
        });
    },

    animate() {
        if (document.getElementById("step3").classList.contains("active")) {
            this.cards.forEach(card => {
                card.tick(this.cards);

                if (card.el) {
                    card.el.style.left = `${card.x}px`;
                    card.el.style.top = `${card.y}px`;
                }
            });
        }

        requestAnimationFrame(() => this.animate());
    }
};

app.init();
</script>
</body>
</html>
